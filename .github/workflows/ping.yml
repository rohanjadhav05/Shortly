name: Ping Render

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      url:
        description: The URL to ping
        required: true
        default: https://shortly-oe7u.onrender.com/health

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: curl https://shortly-oe7u.onrender.com/health